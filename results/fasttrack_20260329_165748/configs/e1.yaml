experiment:
  id: E1_gqa_replace_all_fasttrack_20260329_165748
  description: 'Causal hypothesis: replacing all contradicted beliefs with GT flips
    answer to correct.'
  evidence_for: H1 - Premise errors cause wrong answers
  paper_section: Main Results, Table 1
  expected_flip_rate: 0.6
dataset:
  name: gqa
  split: val_balanced
  n_samples: 500
  random_seed: 42
  scene_graph_version: latest
  notes: Phase 1 setup; rerun for reproducibility validation
model:
  name: Qwen2.5-VL
  model_id: Qwen/Qwen2.5-VL-7B-Instruct
  device: cuda:0
  temperature: 0.0
  max_tokens: 768
  deterministic: true
  notes: 'Deterministic: temp=0, fixed seed, reproducible across runs'
pipeline:
  stages:
  - name: baseline_inference
    enabled: true
    description: Capture baseline answer without belief externalization
  - name: belief_externalization
    enabled: true
    description: Force VLM to verbalize atomic premises before reasoning
  - name: claim_extraction
    enabled: true
    config:
      max_claims_per_sample: 10
    description: Extract atomic claims from belief text; classify by type
  - name: verification
    enabled: true
    verifier_profile: balanced
    description: Verify claims against scene graph; mark SUPPORTED/CONTRADICTED/UNCERTAIN
  - name: intervention_policy
    enabled: true
    policy: replace_contradicted_with_ground_truth
    description: Replace all contradicted claims with ground truth from scene graph
  - name: constrained_reasoning
    enabled: true
    description: Re-answer question with corrected belief set; re-inference
  - name: error_classification
    enabled: true
    description: Compare baseline vs corrected answer; measure flip-to-correct
evaluation:
  primary_metric: flip_to_correct_rate
  secondary_metrics:
  - n_flipped
  - baseline_accuracy
  - corrected_accuracy
  - avg_contradicted_claims_per_sample
  statistical_test: chi_squared
  confidence_level: 0.95
  stratify_by:
  - claim_type
  - question_type
  - answer_type
  hypothesis_test: 'H0: flip_rate <= 0.25 (random baseline) vs H1: flip_rate > 0.50'
  notes: "Gap vs random ablation (E1 - E_random) \u226530 pp indicates strong causal\
    \ signal"
outputs:
  results_csv: /data/cs22btech11029/playground/Inference_time_VLM/results/fasttrack_20260329_165748/results_E1_gqa_replace_all_fasttrack_20260329_165748.csv
  summary_json: /data/cs22btech11029/playground/Inference_time_VLM/results/fasttrack_20260329_165748/summary_E1_gqa_replace_all_fasttrack_20260329_165748.json
  manifest_json: /data/cs22btech11029/playground/Inference_time_VLM/results/fasttrack_20260329_165748/manifest_E1_gqa_replace_all_fasttrack_20260329_165748.json
  figures_dir: results/figures_e1/
reproducibility:
  random_seed: 42
  deterministic_mode: true
  pytorch_deterministic: true
  cuda_deterministic: true
  log_git_hash: true
  log_code_hash: true
  log_config_hash: true
  notes: All sources of randomness are fixed and logged in manifest
notes: "This is a reproduction of Phase 1 Experiment 2 (premise correction).\nExpected\
  \ outcome: ~60% flip rate, consistent with Phase 1 results on same dataset.\nIf\
  \ outcome diverges, investigate changes in:\n  1. Model version (Qwen checkpoint)\n\
  \  2. Verifier thresholds (can tune via profile)\n  3. Claim coverage (may vary\
  \ with dataset sampling)\n"
