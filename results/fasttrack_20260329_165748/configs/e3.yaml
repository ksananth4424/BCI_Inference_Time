experiment:
  id: E3_gqa_remove_single_fasttrack_20260329_165748
  description: 'Necessity test: removing single contradicted belief; weaker intervention
    than E1'
  evidence_for: H1 - Premises are necessary (but not always sufficient alone)
  paper_section: 'Appendix: Supplementary analysis'
  expected_flip_rate: 0.28
dataset:
  name: gqa
  split: val_balanced
  n_samples: 500
  random_seed: 42
  scene_graph_version: latest
model:
  name: Qwen2.5-VL
  model_id: Qwen/Qwen2.5-VL-7B-Instruct
  device: cuda:1
  temperature: 0.0
  max_tokens: 768
  deterministic: true
pipeline:
  stages:
  - name: baseline_inference
    enabled: true
  - name: belief_externalization
    enabled: true
  - name: claim_extraction
    enabled: true
    config:
      max_claims_per_sample: 10
  - name: verification
    enabled: true
    verifier_profile: balanced
  - name: intervention_policy
    enabled: true
    policy: remove_contradicted_only
    description: Remove only the single most-contradicted belief; keep rest
  - name: constrained_reasoning
    enabled: true
  - name: error_classification
    enabled: true
evaluation:
  primary_metric: flip_to_correct_rate
  secondary_metrics:
  - n_flipped
  - baseline_accuracy
  - corrected_accuracy
  statistical_test: chi_squared
  confidence_level: 0.95
  stratify_by:
  - claim_type
  - question_type
  hypothesis_test: 'H0: flip_rate <= 0.25 vs H1: flip_rate > 0.25'
  notes: E3 - E1 should be negative (E1 is stronger); verifies necessity hierarchy
outputs:
  results_csv: /data/cs22btech11029/playground/Inference_time_VLM/results/fasttrack_20260329_165748/results_E3_gqa_remove_single_fasttrack_20260329_165748.csv
  summary_json: /data/cs22btech11029/playground/Inference_time_VLM/results/fasttrack_20260329_165748/summary_E3_gqa_remove_single_fasttrack_20260329_165748.json
  manifest_json: /data/cs22btech11029/playground/Inference_time_VLM/results/fasttrack_20260329_165748/manifest_E3_gqa_remove_single_fasttrack_20260329_165748.json
reproducibility:
  random_seed: 42
  deterministic_mode: true
  pytorch_deterministic: true
notes: 'This reproduces Phase 1 Experiment 4 (belief minimality).

  Expected outcome: ~28% flip rate (weaker than E1''s 60%).

  Demonstrates that a single premise is NOT always sufficient; interactions exist.

  Useful for error breakdown analysis: premise errors often involve multiple beliefs.

  '
