# Phase 2, Experiment 12b: Tuned Confidence-Gated E1 with Localized GT Edits (GQA)
# Multi-seed stability run (seed=456)
# Date: 2026-04-09

experiment:
  id: "E12b_gqa_confidence_gated_e1_tuned_n2000_seed456"
  description: "E12b n=2000 multi-seed stability run (seed=456)."
  evidence_for: "H1/H2 - targeted intervention improves reliability"
  paper_section: "Main Results, confidence-gated ablations"

dataset:
  name: "gqa"
  split: "val_balanced"
  n_samples: 2000
  random_seed: 456
  scene_graph_version: "latest"

model:
  name: "Qwen2.5-VL"
  model_id: "Qwen/Qwen2.5-VL-7B-Instruct"
  device: "cuda:1"
  temperature: 0.0
  max_tokens: 768
  deterministic: true

pipeline:
  stages:
    - name: "baseline_inference"
      enabled: true

    - name: "belief_externalization"
      enabled: true

    - name: "claim_extraction"
      enabled: true
      config:
        max_claims_per_sample: 10

    - name: "verification"
      enabled: true
      verifier_profile: "balanced"

    - name: "intervention_policy"
      enabled: true
      policy: "replace_contradicted_with_ground_truth"
      enable_confidence_gate: true
      min_intervention_score: 0.18
      localized_gt_edits: true
      max_injected_facts: 80
      enable_uncertainty_fallback: true
      description: "Tuned confidence gate with localized GT edit policy"

    - name: "constrained_reasoning"
      enabled: true

    - name: "error_classification"
      enabled: true

evaluation:
  primary_metric: "flip_to_correct_rate"
  secondary_metrics:
    - "n_flipped"
    - "baseline_accuracy"
    - "corrected_accuracy"
    - "avg_contradicted_claims_per_sample"
    - "intervened_rate"
    - "avg_intervention_score"

outputs:
  results_csv: "results/e12b_gqa_confidence_gated_n2000_seed456_results.csv"
  summary_json: "results/e12b_gqa_confidence_gated_n2000_seed456_summary.json"
  manifest_json: "results/e12b_gqa_confidence_gated_n2000_seed456_manifest.json"
