# Phase 2, Experiment 12: Confidence-Gated E1 with Localized GT Edits (GQA)
#
# Goal: Reduce over-correction while preserving E1 gains by intervening only
# on high-uncertainty samples and restricting GT injection to contradicted types.

experiment:
  id: "E12_gqa_confidence_gated_e1"
  description: "Confidence-gated E1 with localized GT edit policy."
  evidence_for: "H1/H2 - targeted intervention improves reliability"
  paper_section: "Main Results, confidence-gated ablations"

dataset:
  name: "gqa"
  split: "val_balanced"
  n_samples: 500
  random_seed: 42
  scene_graph_version: "latest"

model:
  name: "Qwen2.5-VL"
  model_id: "Qwen/Qwen2.5-VL-7B-Instruct"
  device: "cuda:1"
  temperature: 0.0
  max_tokens: 768
  deterministic: true

pipeline:
  stages:
    - name: "baseline_inference"
      enabled: true

    - name: "belief_externalization"
      enabled: true

    - name: "claim_extraction"
      enabled: true
      config:
        max_claims_per_sample: 10

    - name: "verification"
      enabled: true
      verifier_profile: "balanced"

    - name: "intervention_policy"
      enabled: true
      policy: "replace_contradicted_with_ground_truth"
      enable_confidence_gate: true
      min_intervention_score: 0.25
      localized_gt_edits: true
      max_injected_facts: 60
      enable_uncertainty_fallback: true
      description: "Intervene only when uncertainty score is high; localize GT replacement"

    - name: "constrained_reasoning"
      enabled: true

    - name: "error_classification"
      enabled: true

evaluation:
  primary_metric: "flip_to_correct_rate"
  secondary_metrics:
    - "n_flipped"
    - "baseline_accuracy"
    - "corrected_accuracy"
    - "avg_contradicted_claims_per_sample"
    - "intervened_rate"
    - "avg_intervention_score"

outputs:
  results_csv: "results/e12_gqa_confidence_gated_results.csv"
  summary_json: "results/e12_gqa_confidence_gated_summary.json"
  manifest_json: "results/e12_gqa_confidence_gated_manifest.json"
